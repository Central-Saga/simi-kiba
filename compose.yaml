services:
    laravel.test:
        image: 'sail-8.5/app:latest'
        container_name: simi-kiba-app
        # Kita panggil script yang kita mount di bawah
        entrypoint: [/bin/bash, /usr/local/bin/start-container]
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-8000}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html:z'
            # MOUNT SCRIPT LANGSUNG DARI HOST (SOLUSI JARINGAN RUSAK)
            - './vendor/laravel/sail/runtimes/8.5/start-container:/usr/local/bin/start-container:z'
            - './vendor/laravel/sail/runtimes/8.5/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:z'
            - './vendor/laravel/sail/runtimes/8.5/php.ini:/etc/php/8.5/cli/conf.d/99-sail.ini:z'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
    mysql:
        image: 'mysql:8.4'
        container_name: simi-kiba-mysql
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE:-simi-kiba}'
            MYSQL_USER: '${DB_USERNAME:-sail}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'sail-mysql:/var/lib/mysql:z'
        networks:
            - sail
    redis:
        image: 'redis:alpine'
        container_name: simi-kiba-redis
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data:z'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
