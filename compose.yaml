services:
  app:
    image: bitnami/laravel:latest
    container_name: simi-kiba-app
    user: root
    # Kita bypass script pengecekan Bitnami yang rewel soal permission
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:Z3Rs7Nytmv5jK3WymudaSTREBoJCh+DIvR0y8+lmMEw=
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=simi-kiba
      - DB_USERNAME=sail
      - DB_PASSWORD=password
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: simi-kiba-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=simi-kiba
      - MYSQL_USER=sail
      - MYSQL_PASSWORD=password
    volumes:
      - simi-kiba-db:/var/lib/mysql

volumes:
  simi-kiba-db:
    driver: local
